    <meta charset="utf-8">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Admin Panel | Singapore MRT Info" />

<body>
    <div class="login-bg">
        <div class="login-card glass-strong">
            <div class="login-logo">
                <span class="login-dot"></span>
                <span class="login-title">MRT Info</span>
                <span class="login-sub">Admin Panel</span>
            </div>

            <form id="login-form" novalidate autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="username">Username or Email</label>
                    <input type="text" class="form-input" id="username" name="username" autocomplete="username"
                        placeholder="your_username" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="form-input-wrap">
                        <input type="password" class="form-input" id="password" name="password"
                            autocomplete="current-password" placeholder="••••••••••" required />
                        <button type="button" class="form-input-icon" id="toggle-pw"></button>
                    </div>
                </div>
                <div id="login-error" class="login-error" style="display:none"></div>
                <button type="submit" class="icon-btn primary login-btn" id="submit-btn">
                    Sign In
                </button>
            </form>

            <p class="login-footer">
                Don't have an account? Contact the administrator.
            </p>
        </div>
    </div>

    <script src="/index.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>
