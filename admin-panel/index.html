    <meta charset="utf-8">
    <title>Admin Panel | Singapore MRT Info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A simple template app; view live template at a glance!">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Admin Panel | Singapore MRT Info" />
    <meta property="og:site_name" content="Singapore MRT Info" />

    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/shared/shared.css" />

    <!-- Embed Image -->
    <link rel="apple-touch-icon" href="/templateicon1.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="shortcut icon" href="/favicon.ico">

    <meta property="og:image" content="/templateicon1.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script defer="" src="https://use.fontawesome.com/releases/v6.5.2/js/all.js"></script>
</head>

<body>
    <div class="login-bg">
        <div class="login-card glass-strong">
            <div class="login-logo">
                <span class="login-dot"></span>
                <span class="login-title">MRT Info</span>
                <span class="login-sub">Admin Panel</span>
            </div>

            <!-- Login View -->
            <div id="login-view">
                <form id="login-form" novalidate autocomplete="on">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" class="form-input" id="username" name="username" autocomplete="username"
                            placeholder="your_username" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="form-input-wrap">
                            <input type="password" class="form-input" id="password" name="password"
                                autocomplete="current-password" placeholder="••••••••••" required />
                            <button type="button" class="form-input-icon" id="toggle-pw"></button>
                        </div>
                    </div>
                    <div id="login-error" class="login-error" style="display:none"></div>
                    <button type="submit" class="icon-btn primary login-btn" id="submit-btn">
                        Sign In
                    </button>
                </form>
                <p class="login-footer">
                    Don't have an account? <button type="button" class="login-link" id="show-register">Register an account.</button>
                </p>
            </div>

            <!-- Register View -->
            <div id="register-view" style="display:none">
                <form id="register-form" novalidate autocomplete="off">
                    <div class="form-group">
                        <label class="form-label" for="reg-username">Username</label>
                        <input type="text" class="form-input" id="reg-username" name="username"
                            autocomplete="username" placeholder="your_username" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-email">Email</label>
                        <input type="email" class="form-input" id="reg-email" name="email"
                            autocomplete="email" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-display-name">Display Name <span class="form-muted">(optional)</span></label>
                        <input type="text" class="form-input" id="reg-display-name" name="display_name"
                            placeholder="Your Name" />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-password">Password</label>
                        <div class="form-input-wrap">
                            <input type="password" class="form-input" id="reg-password" name="password"
                                autocomplete="new-password" placeholder="••••••••••" required />
                            <button type="button" class="form-input-icon" id="toggle-reg-pw"></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-confirm">Confirm Password</label>
                        <div class="form-input-wrap">
                            <input type="password" class="form-input" id="reg-confirm" name="confirm_password"
                                autocomplete="new-password" placeholder="••••••••••" required />
                            <button type="button" class="form-input-icon" id="toggle-reg-confirm"></button>
                        </div>
                    </div>
                    <div id="register-error" class="login-error" style="display:none"></div>
                    <button type="submit" class="icon-btn primary login-btn" id="register-btn">
                        Register
                    </button>
                </form>
                <p class="login-footer">
                    Already have an account? <button type="button" class="login-link" id="show-login">Sign in.</button>
                </p>
            </div>

            <!-- Success View -->
            <div id="success-view" style="display:none">
                <div class="register-success">
                    <p>Your account request has been submitted.</p>
                    <p>Access is subject to admin approval. You'll be able to sign in once your account is approved.</p>
                </div>
                <p class="login-footer">
                    <button type="button" class="login-link" id="back-to-login">Back to sign in.</button>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="/index.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>

</body>

</html>
